# 今天吃什么 - AI美食推荐助手
# Docker Compose 配置文件

services:
  # Neo4j 图数据库
  neo4j:
    image: neo4j:5.11-community
    container_name: what-to-eat-neo4j
    environment:
      - NEO4J_AUTH=neo4j/all-in-rag
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use_neo4j_config=true
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - ./data/cypher:/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p all-in-rag 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # 注意：向量数据库已迁移为本地 ChromaDB（见 CHROMA_PERSIST_DIR），
  #       不再需要 Milvus / etcd / MinIO 服务。

  # Neo4j 数据自动导入服务
  neo4j-init:
    image: neo4j:5.11-community
    container_name: what-to-eat-neo4j-init
    environment:
      - NEO4J_AUTH=neo4j/all-in-rag
    volumes:
      - ./data/cypher:/import
    depends_on:
      neo4j:
        condition: service_healthy
    command: >
      bash -c "
        echo '检查Neo4j数据库是否为空...'
        COUNT=$$(cypher-shell -a bolt://neo4j:7687 -u neo4j -p all-in-rag 'MATCH (n) RETURN count(n) as count' --format plain | tail -n 1)
        if [ \"$$COUNT\" = \"0\" ] && [ -f /import/neo4j_import.cypher ]; then
          echo '数据库为空，开始导入数据...'
          cypher-shell -a bolt://neo4j:7687 -u neo4j -p all-in-rag -f /import/neo4j_import.cypher
          echo '数据导入完成！'
        else
          echo '数据库已有数据或导入文件不存在，跳过导入'
        fi
      "
    restart: "no"

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:

networks:
  default:
    name: what-to-eat-network
